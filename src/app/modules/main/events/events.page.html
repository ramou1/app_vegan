<ion-header>
  <ion-toolbar>
    <ion-title>Eventos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card *ngFor="let event of events" (click)="openEvent(event)">
    <ion-card-header class="ion-no-padding">
      <img src="../assets/images/{{event.image ? event.image : 'slider-default.png'}}">
    </ion-card-header>

    <ion-card-content>
      <p class="event-title"> {{ event?.title }} </p>

      <ion-item lines="none">
        <ion-icon name="location-outline" slot="start"></ion-icon>
        <ion-label>
          <p class="event-local"> {{ event?.local }} </p>
        </ion-label>
      </ion-item>

      <ion-item lines="none">
        <ion-icon name="people-outline" slot="start"></ion-icon>
        <ion-label>
          <p class="event-local"> {{ event.confirmed? event.confirmed.length : '0' }} Confirmed</p>
        </ion-label>
      </ion-item>
    </ion-card-content>

    <ion-button class="interested-button" expand="block" shape="round" color="primary" (click)="checkInterested(event)">I'm Interested</ion-button>

  </ion-card>

</ion-content>
